<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Out — Scope Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:  '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              800: '#1e40af',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-100 antialiased min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-sm">

    <!-- Brand header -->
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-primary-700">Scope Manager</h1>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-8 text-center">

      <!-- Icon -->
      <div class="mx-auto mb-4 flex items-center justify-center w-12 h-12 rounded-full bg-gray-100">
        <svg class="w-6 h-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
        </svg>
      </div>

      <h2 class="text-lg font-semibold text-gray-800 mb-1">Sign out?</h2>
      <p class="text-sm text-gray-500 mb-7">Are you sure you want to sign out?</p>

      <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}

        <div class="flex flex-col gap-3">
          <button type="submit"
                  class="w-full py-2.5 bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium rounded-lg transition-colors">
            Yes, sign me out
          </button>
          <a href="{% url 'projects:list' %}"
             class="w-full py-2.5 text-sm font-medium text-gray-600 hover:text-gray-800 rounded-lg border border-gray-200 hover:border-gray-300 transition-colors">
            Cancel
          </a>
        </div>

      </form>
    </div>

  </div>

</body>
</html>
