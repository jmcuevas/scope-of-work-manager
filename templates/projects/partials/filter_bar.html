<div class="mb-4">
  <!--
    Filter form. hx-trigger="filterApply" means it only fires when JS calls
    applyFilter() — never automatically on change. Selects call applyFilter()
    directly via onchange; the status and manager panels fire on close / Apply button.
  -->
  <form id="filter-form"
        hx-get="{% url 'projects:dashboard' project.pk %}"
        hx-target="#dashboard-content"
        hx-push-url="true"
        hx-trigger="filterApply"
        class="flex flex-wrap items-center gap-3 bg-white border border-gray-200 rounded-lg px-4 py-3">

    <!-- Status multi-select dropdown -->
    <div class="flex items-center gap-2">
      <label class="text-xs font-medium text-gray-500 whitespace-nowrap">Status</label>
      <div class="relative" id="status-multiselect">
        <!-- Trigger button -->
        <button type="button"
                id="status-trigger"
                onclick="togglePanel(event, 'status-panel')"
                class="border border-gray-200 rounded-md px-2.5 py-1 text-xs text-gray-600 bg-white hover:border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary-500 flex items-center gap-2 min-w-[120px]">
          <span>
            {% if active_status_filters %}
              {% if active_status_filters|length == 1 %}{{ active_status_filter_items.0.label }}{% else %}{{ active_status_filters|length }} statuses{% endif %}
            {% else %}All{% endif %}
          </span>
          <svg class="w-3 h-3 ml-auto shrink-0 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </button>
        <!-- Checkbox panel -->
        <div id="status-panel"
             class="absolute top-full left-0 mt-1 w-48 bg-white border border-gray-200 rounded-lg shadow-lg z-20 hidden">
          <div class="flex items-center justify-between px-3 py-1.5 border-b border-gray-100">
            <button type="button" onclick="selectAll('status')" class="text-xs text-primary-600 hover:text-primary-800 font-medium">All</button>
            <button type="button" onclick="selectNone('status')" class="text-xs text-gray-400 hover:text-gray-600 font-medium">None</button>
          </div>
          <div class="py-1">
            {% for value, label in trade_status_choices %}
              <label class="flex items-center gap-2.5 px-3 py-1.5 hover:bg-gray-50 cursor-pointer text-xs text-gray-700 select-none">
                <input type="checkbox"
                       name="status"
                       value="{{ value }}"
                       {% if value in active_status_filters %}checked{% endif %}
                       class="w-3.5 h-3.5 rounded border-gray-300 text-primary-600 focus:ring-primary-500 focus:ring-1">
                {{ label }}
              </label>
            {% endfor %}
          </div>
          <div class="border-t border-gray-100 px-3 py-2">
            <button type="button" onclick="closePanel('status-panel')"
                    class="w-full text-center text-xs font-medium text-white bg-primary-600 hover:bg-primary-700 px-3 py-1 rounded-md">
              Apply
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div class="hidden sm:block h-4 w-px bg-gray-200"></div>

    <!-- Manager multi-select dropdown -->
    <div class="flex items-center gap-2">
      <label class="text-xs font-medium text-gray-500 whitespace-nowrap">Manager</label>
      <div class="relative" id="manager-multiselect">
        <!-- Trigger button -->
        <button type="button"
                id="manager-trigger"
                onclick="togglePanel(event, 'manager-panel')"
                class="border border-gray-200 rounded-md px-2.5 py-1 text-xs text-gray-600 bg-white hover:border-gray-300 focus:outline-none focus:ring-2 focus:ring-primary-500 flex items-center gap-2 min-w-[120px]">
          <span>
            {% if active_assigned_to_filters %}
              {% if active_assigned_to_filters|length == 1 %}{{ active_assigned_to_filter_items.0.label }}{% else %}{{ active_assigned_to_filters|length }} managers{% endif %}
            {% else %}All{% endif %}
          </span>
          <svg class="w-3 h-3 ml-auto shrink-0 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
          </svg>
        </button>
        <!-- Checkbox panel -->
        <div id="manager-panel"
             class="absolute top-full left-0 mt-1 w-52 bg-white border border-gray-200 rounded-lg shadow-lg z-20 hidden">
          <div class="flex items-center justify-between px-3 py-1.5 border-b border-gray-100">
            <button type="button" onclick="selectAll('assigned_to')" class="text-xs text-primary-600 hover:text-primary-800 font-medium">All</button>
            <button type="button" onclick="selectNone('assigned_to')" class="text-xs text-gray-400 hover:text-gray-600 font-medium">None</button>
          </div>
          <div class="py-1">
            <label class="flex items-center gap-2.5 px-3 py-1.5 hover:bg-gray-50 cursor-pointer text-xs text-gray-700 select-none">
              <input type="checkbox"
                     name="assigned_to"
                     value="unassigned"
                     {% if 'unassigned' in active_assigned_to_filters %}checked{% endif %}
                     class="w-3.5 h-3.5 rounded border-gray-300 text-primary-600 focus:ring-primary-500 focus:ring-1">
              Unassigned
            </label>
            {% for user in company_users %}
              <label class="flex items-center gap-2.5 px-3 py-1.5 hover:bg-gray-50 cursor-pointer text-xs text-gray-700 select-none">
                <input type="checkbox"
                       name="assigned_to"
                       value="{{ user.pk }}"
                       {% if user.pk|stringformat:"i" in active_assigned_to_filters %}checked{% endif %}
                       class="w-3.5 h-3.5 rounded border-gray-300 text-primary-600 focus:ring-primary-500 focus:ring-1">
                {{ user.get_full_name|default:user.email }}
              </label>
            {% endfor %}
          </div>
          <div class="border-t border-gray-100 px-3 py-2">
            <button type="button" onclick="closePanel('manager-panel')"
                    class="w-full text-center text-xs font-medium text-white bg-primary-600 hover:bg-primary-700 px-3 py-1 rounded-md">
              Apply
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div class="hidden sm:block h-4 w-px bg-gray-200"></div>

    <!-- Group by — applies immediately -->
    <div class="flex items-center gap-2">
      <label class="text-xs font-medium text-gray-500 whitespace-nowrap" for="filter-group">Group by</label>
      <select id="filter-group" name="group"
              onchange="applyFilter()"
              class="border border-gray-200 rounded-md px-2 py-1 text-xs text-gray-600 focus:outline-none focus:ring-2 focus:ring-primary-500 bg-white">
        <option value="flat" {% if not group_by or group_by == 'flat' %}selected{% endif %}>None</option>
        <option value="status" {% if group_by == 'status' %}selected{% endif %}>Status</option>
        <option value="assigned_to" {% if group_by == 'assigned_to' %}selected{% endif %}>Manager</option>
      </select>
    </div>

    <!-- Hidden: preserve sort state when filter/group changes -->
    {% if sort_by %}<input type="hidden" name="sort" value="{{ sort_by }}">{% endif %}
    {% if sort_dir and sort_dir != 'asc' %}<input type="hidden" name="dir" value="{{ sort_dir }}">{% endif %}

    <!-- Clear filters — always visible -->
    <button type="button"
            onclick="clearAllFilters()"
            class="ml-auto text-xs text-gray-400 hover:text-gray-600 underline underline-offset-2 whitespace-nowrap">
      Clear filters
    </button>

  </form>
</div>

<script>
  function applyFilter() {
    htmx.trigger(document.getElementById('filter-form'), 'filterApply');
  }

  function togglePanel(e, panelId) {
    e.stopPropagation();
    // Close other panels first
    ['status-panel', 'manager-panel'].forEach(function(id) {
      if (id !== panelId) {
        document.getElementById(id).classList.add('hidden');
      }
    });
    document.getElementById(panelId).classList.toggle('hidden');
  }

  function closePanel(panelId) {
    var panel = document.getElementById(panelId);
    if (panel && !panel.classList.contains('hidden')) {
      panel.classList.add('hidden');
      applyFilter();
    }
  }

  function selectAll(fieldName) {
    var form = document.getElementById('filter-form');
    form.querySelectorAll('input[name="' + fieldName + '"]').forEach(function(cb) { cb.checked = true; });
  }

  function selectNone(fieldName) {
    var form = document.getElementById('filter-form');
    form.querySelectorAll('input[name="' + fieldName + '"]').forEach(function(cb) { cb.checked = false; });
  }

  // Close panels + apply on outside click
  document.addEventListener('click', function(e) {
    var statusMs = document.getElementById('status-multiselect');
    var managerMs = document.getElementById('manager-multiselect');
    if (statusMs && !statusMs.contains(e.target)) {
      var panel = document.getElementById('status-panel');
      if (panel && !panel.classList.contains('hidden')) {
        panel.classList.add('hidden');
        applyFilter();
      }
    }
    if (managerMs && !managerMs.contains(e.target)) {
      var panel = document.getElementById('manager-panel');
      if (panel && !panel.classList.contains('hidden')) {
        panel.classList.add('hidden');
        applyFilter();
      }
    }
  });

  function clearAllFilters() {
    var form = document.getElementById('filter-form');
    form.querySelectorAll('input[name="status"]').forEach(function(cb) { cb.checked = false; });
    form.querySelectorAll('input[name="assigned_to"]').forEach(function(cb) { cb.checked = false; });
    applyFilter();
  }
</script>
