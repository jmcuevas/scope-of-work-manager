<div id="item-{{ item.pk }}"
     class="py-3 bg-primary-50 border-l-2 border-primary-400 pr-4"
     style="padding-left: {{ item.level|add:1 }}rem;">
  <form hx-post="{% url 'exhibits:item_edit' exhibit.pk section.pk item.pk %}"
        hx-target="#item-{{ item.pk }}"
        hx-swap="outerHTML">
    <textarea name="text"
              rows="2"
              autofocus
              onkeydown="
                if(event.key==='Enter'){
                  event.preventDefault();
                  this._submitted=true;
                  if(event.shiftKey){
                    htmx.ajax('POST','{% url 'exhibits:item_insert_below' exhibit.pk section.pk item.pk %}',{target:'#items-{{ section.pk }}',swap:'innerHTML',values:{text:this.value}});
                  } else {
                    this.form.requestSubmit();
                  }
                }
              "
              onblur="if(!this._submitted){this._submitted=true;this.form.requestSubmit();}"
              class="w-full text-sm text-gray-700 border border-gray-200 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-primary-400 resize-none">{{ item.text }}</textarea>
  </form>
</div>
