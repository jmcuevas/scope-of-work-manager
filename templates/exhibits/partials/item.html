{% load exhibit_tags %}
{% with note_count=item_note_counts|get_item:item.pk %}
{% with item_number=numbers|get_item:item.pk %}
<div id="item-{{ item.pk }}"
     class="flex items-start justify-between py-2.5 group hover:bg-gray-50 transition-colors"
     style="padding-left: {{ item.level|add:1 }}rem; padding-right: 1rem;">
  <p class="text-sm text-gray-700 flex-1 leading-relaxed cursor-pointer hover:text-primary-700 transition-colors"
     hx-get="{% url 'exhibits:item_edit' exhibit.pk section.pk item.pk %}"
     hx-target="#item-{{ item.pk }}"
     hx-swap="outerHTML"
     title="Click to edit">
    {% if item_number %}
      <span class="text-gray-400 font-mono text-xs mr-2 select-none">{{ item_number }}</span>
    {% endif %}
    {{ item.text }}
  </p>
  <div class="flex items-center gap-1 ml-3 shrink-0">
    <!-- Comment icon (always visible) -->
    <button onclick="linkNoteToItem({{ item.pk }}, '{{ section.name|escapejs }}', '{{ item_number|default:''|escapejs }}')"
            title="Add note"
            class="relative flex items-center {% if note_count %}text-primary-500{% else %}text-gray-300 opacity-0 group-hover:opacity-100{% endif %} hover:text-primary-600 px-1 py-0.5 rounded transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd" />
      </svg>
      {% if note_count %}
        <span class="ml-0.5 text-xs font-medium">{{ note_count }}</span>
      {% endif %}
    </button>
    <!-- Hover controls -->
    <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
      <button hx-post="{% url 'exhibits:item_move' exhibit.pk section.pk item.pk 'up' %}"
              hx-target="#items-{{ section.pk }}"
              hx-swap="innerHTML"
              title="Move up"
              class="text-xs text-gray-400 hover:text-gray-700 px-1 py-0.5 rounded transition-colors">
        ↑
      </button>
      <button hx-post="{% url 'exhibits:item_move' exhibit.pk section.pk item.pk 'down' %}"
              hx-target="#items-{{ section.pk }}"
              hx-swap="innerHTML"
              title="Move down"
              class="text-xs text-gray-400 hover:text-gray-700 px-1 py-0.5 rounded transition-colors">
        ↓
      </button>
      <button hx-post="{% url 'exhibits:item_indent' exhibit.pk section.pk item.pk %}"
              hx-target="#items-{{ section.pk }}"
              hx-swap="innerHTML"
              title="Indent"
              class="text-xs text-gray-400 hover:text-gray-700 px-1 py-0.5 rounded transition-colors">
        →
      </button>
      <button hx-post="{% url 'exhibits:item_outdent' exhibit.pk section.pk item.pk %}"
              hx-target="#items-{{ section.pk }}"
              hx-swap="innerHTML"
              title="Outdent"
              class="text-xs text-gray-400 hover:text-gray-700 px-1 py-0.5 rounded transition-colors">
        ←
      </button>
      <button hx-post="{% url 'exhibits:item_delete' exhibit.pk section.pk item.pk %}"
              hx-target="#items-{{ section.pk }}"
              hx-swap="innerHTML"
              hx-confirm="Delete this item and any sub-items?"
              title="Delete"
              class="text-gray-400 hover:text-red-500 px-1 py-0.5 rounded transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
        </svg>
      </button>
    </div>
  </div>
</div>
{% endwith %}
{% endwith %}
