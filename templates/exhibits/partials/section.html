<div class="bg-white rounded-lg border border-gray-200 mb-3" id="section-{{ section.pk }}">

  <!-- Section header -->
  <div id="section-header-{{ section.pk }}" class="group flex items-center justify-between px-4 py-3 border-b border-gray-100 bg-gray-50 rounded-t-lg">

    <!-- Inline rename form -->
    <form hx-post="{% url 'exhibits:section_rename' exhibit.pk section.pk %}"
          hx-target="#section-list"
          hx-swap="innerHTML"
          class="flex-1 flex items-center gap-2 mr-3 min-w-0">
      <input type="text"
             name="name"
             value="{{ section.name }}"
             class="peer flex-1 min-w-0 text-sm font-semibold text-gray-800 bg-transparent border-b border-transparent hover:border-gray-300 focus:border-primary-400 focus:outline-none focus:ring-0 py-0.5 transition-colors">
      <button type="submit"
              class="text-xs text-gray-400 hover:text-primary-600 opacity-0 peer-focus:opacity-100 transition-opacity whitespace-nowrap">
        Save
      </button>
    </form>

    <!-- Section header controls -->
    <div class="flex items-center gap-0.5 shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">

      {% if ai_enabled %}
      <!-- AI icon + popover -->
      <div class="relative">
        <button onclick="toggleSectionAIPanel(event, {{ section.pk }})"
                title="Ask AI"
                class="p-1.5 text-gray-300 hover:text-primary-500 rounded transition-colors text-xs">
          ✨
        </button>
        <div id="section-ai-panel-{{ section.pk }}"
             class="hidden absolute right-0 top-8 z-20 bg-white border border-gray-200 rounded-lg shadow-lg p-3 w-72">
          <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Ask AI</p>
          <form hx-post="{% url 'exhibits:item_generate' exhibit.pk section.pk %}"
                hx-target="#items-{{ section.pk }}"
                hx-swap="innerHTML"
                hx-indicator="#ai-item-spinner-{{ section.pk }}"
                hx-on:htmx:after-request="document.getElementById('section-ai-panel-{{ section.pk }}').classList.add('hidden'); this.reset();"
                class="space-y-2">
            <input type="text"
                   id="section-ai-input-{{ section.pk }}"
                   name="text"
                   placeholder="Describe an item in plain language — AI will polish it..."
                   class="w-full text-xs text-gray-700 border border-gray-200 rounded px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-primary-400">
            <button type="submit"
                    class="w-full flex items-center justify-center gap-1 px-2 py-1.5 text-xs font-medium bg-primary-600 hover:bg-primary-700 text-white rounded transition-colors">
              <span id="ai-item-spinner-{{ section.pk }}" class="htmx-indicator">⏳</span>
              ✨ Ask AI
            </button>
          </form>
        </div>
      </div>
      {% endif %}

      <!-- 3-dot menu -->
      <div class="relative">
        <button onclick="toggleSectionMenu(event, {{ section.pk }})"
                title="Section options"
                class="p-1.5 text-gray-400 hover:text-gray-700 rounded transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z" />
          </svg>
        </button>
        <div id="section-menu-{{ section.pk }}"
             class="hidden absolute right-0 top-8 z-20 bg-white border border-gray-200 rounded-lg shadow-lg py-1 w-36">
          <button hx-post="{% url 'exhibits:section_move' exhibit.pk section.pk %}"
                  hx-vals='{"direction": "up"}'
                  hx-target="#section-list"
                  hx-swap="innerHTML"
                  class="w-full flex items-center gap-2 px-3 py-1.5 text-xs text-gray-600 hover:bg-gray-50 transition-colors text-left">
            <span class="text-gray-400">↑</span> Move up
          </button>
          <button hx-post="{% url 'exhibits:section_move' exhibit.pk section.pk %}"
                  hx-vals='{"direction": "down"}'
                  hx-target="#section-list"
                  hx-swap="innerHTML"
                  class="w-full flex items-center gap-2 px-3 py-1.5 text-xs text-gray-600 hover:bg-gray-50 transition-colors text-left">
            <span class="text-gray-400">↓</span> Move down
          </button>
          <div class="border-t border-gray-100 my-1"></div>
          <button hx-post="{% url 'exhibits:section_delete' exhibit.pk section.pk %}"
                  hx-target="#section-list"
                  hx-swap="innerHTML"
                  hx-confirm="Delete '{{ section.name }}' and all its items?"
                  class="w-full flex items-center gap-2 px-3 py-1.5 text-xs text-red-500 hover:bg-red-50 transition-colors text-left">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
            </svg>
            Delete section
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- Item list -->
  <div id="items-{{ section.pk }}" class="divide-y divide-gray-50">
    {% load exhibit_tags %}
    {% include "exhibits/partials/item_list.html" with items=items_by_section|get_item:section.pk %}
  </div>

  <!-- Add item form -->
  <div class="px-4 py-2.5 border-t border-gray-100">
    <form hx-post="{% url 'exhibits:item_add' exhibit.pk section.pk %}"
          hx-target="#items-{{ section.pk }}"
          hx-swap="innerHTML"
          hx-on:htmx:after-request="this.reset()"
          class="flex items-center gap-2">
      <input type="text"
             name="text"
             placeholder="Add item..."
             class="flex-1 text-sm text-gray-700 placeholder-gray-300 border-0 focus:outline-none focus:ring-0 py-1 bg-transparent">
      <button type="submit"
              class="text-xs font-medium text-primary-600 hover:text-primary-800 transition-colors whitespace-nowrap">
        + Add
      </button>
    </form>
  </div>

</div>
