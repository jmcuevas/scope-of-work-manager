{% for session in sessions %}
<button type="button"
        hx-get="{% url 'exhibits:ai_chat_switch' exhibit.pk session.pk %}"
        hx-target="#right-panel-chat"
        hx-swap="innerHTML"
        class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left transition-colors
               {% if session.pk == active_session_pk %}bg-primary-50 text-primary-700{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
  <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 shrink-0 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
    <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd" />
  </svg>
  <span class="truncate text-xs font-medium">{{ session.title|default:"Chat #"|add:session.pk|stringformat:"s" }}</span>
  <span class="ml-auto text-xs text-gray-400 shrink-0">{{ session.updated_at|timesince|truncatewords:2 }} ago</span>
</button>
{% empty %}
<p class="px-3 py-2 text-xs text-gray-400 italic">No past chats.</p>
{% endfor %}
