<div id="chat-session-title-area" class="relative"{% if oob %} hx-swap-oob="true"{% endif %}>
  <button type="button"
          onclick="toggleSessionDropdown(event)"
          class="flex items-center gap-1 text-sm font-semibold text-gray-800 hover:text-gray-600 min-w-0 group">
    <span class="truncate">{{ session.title|default:"New chat" }}</span>
    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-gray-400 shrink-0" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
    </svg>
  </button>

  <div id="session-dropdown"
       class="hidden absolute left-0 top-full mt-1 z-40 bg-white border border-gray-200 rounded-lg shadow-lg w-64 py-1">

    <!-- New chat -->
    <button type="button"
            hx-post="{% url 'exhibits:ai_chat_new' exhibit.pk %}"
            hx-target="#right-panel-chat"
            hx-swap="innerHTML"
            onclick="closeSessionDropdown()"
            class="w-full flex items-center gap-2 px-3 py-2 text-xs font-medium text-gray-700 hover:bg-gray-50 transition-colors text-left">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
      </svg>
      New chat
    </button>

    <!-- Other sessions -->
    {% with other_sessions=sessions|slice:":10" %}
    {% for s in other_sessions %}{% if s.pk != session.pk %}
    <button type="button"
            hx-get="{% url 'exhibits:ai_chat_switch' exhibit.pk s.pk %}"
            hx-target="#right-panel-chat"
            hx-swap="innerHTML"
            onclick="closeSessionDropdown()"
            class="w-full flex items-center gap-2 px-3 py-2 text-xs text-gray-600 hover:bg-gray-50 transition-colors text-left">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 shrink-0 text-gray-300" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7z" clip-rule="evenodd" />
      </svg>
      <span class="truncate">{{ s.title|default:"New chat" }}</span>
    </button>
    {% endif %}{% endfor %}
    {% endwith %}

    {% if session %}
    <!-- Rename / Delete -->
    <div class="border-t border-gray-100 mt-1 pt-1">
      <button type="button"
              hx-get="{% url 'exhibits:ai_chat_rename_form' exhibit.pk session.pk %}"
              hx-target="#chat-session-title-area"
              hx-swap="outerHTML"
              onclick="closeSessionDropdown()"
              class="w-full flex items-center gap-2 px-3 py-2 text-xs text-gray-600 hover:bg-gray-50 transition-colors text-left">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
          <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
        </svg>
        Rename
      </button>
      <button type="button"
              onclick="if(!confirm('Delete this chat and all its messages?')) return; closeSessionDropdown();"
              hx-post="{% url 'exhibits:ai_chat_delete' exhibit.pk session.pk %}"
              hx-target="#right-panel-chat"
              hx-swap="innerHTML"
              class="w-full flex items-center gap-2 px-3 py-2 text-xs text-red-600 hover:bg-red-50 transition-colors text-left">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
        </svg>
        Delete
      </button>
    </div>
    {% endif %}
  </div>
</div>
