<form id="note-add-form"
      hx-post="{% url 'notes:note_add' exhibit.pk %}"
      hx-target="#notes-list"
      hx-swap="outerHTML"
      hx-on:htmx:after-request="resetNoteForm()"
      class="space-y-2">

  <!-- Header row -->
  <div class="flex items-center justify-between">
    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Add Note</p>
    <button type="button"
            id="note-form-toggle"
            onclick="
              var body = document.getElementById('note-form-body');
              var icon = document.getElementById('note-form-chevron');
              var collapsed = body.classList.toggle('hidden');
              icon.style.transform = collapsed ? 'rotate(180deg)' : 'rotate(0deg)';
            "
            title="Collapse"
            class="text-gray-400 hover:text-gray-600 transition-colors p-0.5 rounded">
      <svg id="note-form-chevron" xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 transition-transform" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M14.707 12.707a1 1 0 01-1.414 0L10 9.414l-3.293 3.293a1 1 0 01-1.414-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 010 1.414z" clip-rule="evenodd" />
      </svg>
    </button>
  </div>

  <!-- Collapsible body -->
  <div id="note-form-body" class="space-y-2">

    <!-- Scope item context (shown when linked from an item) -->
    <div id="note-item-context" class="hidden items-center justify-between gap-2 bg-primary-50 border border-primary-100 rounded px-2 py-1.5">
      <span class="text-xs text-primary-700 font-medium" id="note-item-label"></span>
      <button type="button" onclick="clearNoteItemLink()" class="text-primary-400 hover:text-primary-600 text-xs leading-none">✕</button>
    </div>
    <input type="hidden" name="scope_item_id" id="note-scope-item-id">

    <!-- Text -->
    <textarea name="text"
              rows="2"
              placeholder="Note text…"
              required
              class="w-full text-xs text-gray-700 border border-gray-200 rounded-md px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-primary-400 resize-none"></textarea>

    <input type="hidden" name="note_type" value="SCOPE_CLARIFICATION">

    <!-- Primary trade -->
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">Primary trade</label>
      <select name="primary_trade"
              required
              class="w-full text-xs text-gray-700 border border-gray-200 rounded-md px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-primary-400">
        <option value="">Select a trade…</option>
        {% for trade in form.fields.primary_trade.queryset %}
          <option value="{{ trade.pk }}" {% if current_trade and trade.pk == current_trade.pk %}selected{% endif %}>
            {{ trade.csi_trade.csi_code }} — {{ trade.csi_trade.name }}
          </option>
        {% endfor %}
      </select>
    </div>

    <!-- Related trades dropdown -->
    {% if form.fields.related_trades.queryset.exists %}
    <div>
      <label class="block text-xs font-medium text-gray-500 mb-1">Related trades <span class="font-normal text-gray-400">(optional)</span></label>
      <details class="relative">
        <summary class="flex items-center justify-between w-full text-xs text-gray-600 border border-gray-200 rounded-md px-2 py-1.5 cursor-pointer select-none hover:border-primary-400 transition-colors list-none [&::-webkit-details-marker]:hidden">
          <span>Select related trades…</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-gray-400 shrink-0" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
          </svg>
        </summary>
        <div class="absolute z-10 left-0 right-0 mt-1 bg-white border border-gray-200 rounded-md shadow-lg py-1 max-h-48 overflow-y-auto">
          {% for trade in form.fields.related_trades.queryset %}
          <label class="flex items-center gap-2 px-3 py-2 hover:bg-gray-50 cursor-pointer">
            <input type="checkbox" name="related_trades" value="{{ trade.pk }}"
                   class="rounded border-gray-300 text-primary-600 focus:ring-primary-400">
            <span class="text-xs text-gray-700">{{ trade.csi_trade.csi_code }} — {{ trade.csi_trade.name }}</span>
          </label>
          {% endfor %}
        </div>
      </details>
    </div>
    {% endif %}

    <!-- Source -->
    <input type="text"
           name="source"
           placeholder="Source (e.g. OAC meeting, field walk) — optional"
           class="w-full text-xs text-gray-700 border border-gray-200 rounded-md px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-primary-400">

    <button type="submit"
            class="w-full px-3 py-1.5 text-xs font-medium bg-primary-600 hover:bg-primary-700 text-white rounded-md transition-colors">
      Add Note
    </button>

  </div><!-- /note-form-body -->
</form>
